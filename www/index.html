<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostOS - High-Level Boot</title>
    <style>
        :root { --main-red: #ff0000; --neon-blue: #00f2ff; }
        
        body, html {
            margin: 0; padding: 0; height: 100vh;
            background: #000; color: #fff;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden; user-select: none;
        }

        
        body::before {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            z-index: 1000; pointer-events: none;
        }

        
        .hud {
            position: fixed; font-size: 10px; color: #444; text-transform: uppercase;
            padding: 10px; width: 100%; display: flex; justify-content: space-between;
        }
        .top { top: 0; } .bottom { bottom: 0; }

        
        .text-3d {
            font-size: 70px; font-weight: 900; text-transform: uppercase;
            text-align: center; letter-spacing: 10px; color: var(--main-red);
            position: relative;
            text-shadow: 3px 0 0 var(--neon-blue), -3px 0 0 #f0f;
            animation: pulse 3s infinite, glitch 0.2s infinite alternate-reverse;
            line-height: 0.8; margin-bottom: 50px;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 1px); filter: hue-rotate(0deg); }
            50% { transform: translate(-1px, -1px); filter: hue-rotate(90deg); }
            100% { transform: translate(1px, 2px); filter: hue-rotate(0deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
        }

        
        #powered-container {
            height: 80px; display: flex; align-items: center; justify-content: center;
        }

        .powered-text {
            font-size: 28px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 5px; color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: impact 0.5s cubic-bezier(0.17, 0.84, 0.44, 1) forwards;
        }

        @keyframes impact {
            0% { transform: scale(5) translateX(100%); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1) translateX(0); opacity: 1; filter: blur(0); }
        }

        
        .letter {
            display: inline-block;
            transition: all 0.6s cubic-bezier(0.6, -0.28, 0.73, 0.05);
        }
        .fall {
            transform: translateY(120vh) rotateX(180deg) scale(0);
            opacity: 0; filter: blur(10px); color: var(--neon-blue) !important;
        }

        
        .shake-hard { animation: hardShake 0.3s linear; }
        @keyframes hardShake {
            0% { transform: translate(0); }
            20% { transform: translate(-10px, 10px); background: rgba(255,0,0,0.1); }
            40% { transform: translate(10px, -10px); }
            60% { transform: translate(-10px, -10px); }
            80% { transform: translate(10px, 10px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body id="main-body">

    <div class="hud top">
        <span>Kernel: GHOST_V6.sys</span>
        <span>Status: Checking system....</span>
    </div>

    <div class="text-3d">Ghost<br>OS</div>

    <div id="powered-container">
        <div class="powered-text" id="target-text">Powered by GhostOS</div>
    </div>

    <div class="hud bottom">
        <span id="hex-loader">0x000000</span>
        <span>Checking BIOS // Developed by Ghost</span>
    </div>

    <script>
        // --- CHECK DE INTEGRIDADE DA BIOS (GHOSTOS ROM VALIDATION) ---
        const biosImage = localStorage.getItem('ghost_bios_image');
        
        // Se não existir nada no localStorage OU se o conteúdo não contiver "thisisvalid"
        if (!biosImage || !biosImage.includes('thisisvalid')) {
            // Redireciona imediatamente para a tela de erro de firmware
            window.location.href = "bios_error.html";
        }
        if(localStorage.getItem('adv_graphics') === 'on') {
                
    window.location.href = "login.html";
        }
        
        const textElement = document.getElementById('target-text');
        const body = document.getElementById('main-body');
        const hexDisplay = document.getElementById('hex-loader');
        
        
        
        textElement.innerHTML = textElement.innerText.split('').map(char => 
            `<span class="letter">${char === ' ' ? '&nbsp;' : char}</span>`
        ).join('');

        const letters = document.querySelectorAll('.letter');
        const neonColors = ['#0ff', '#f0f', '#0f0', '#ff0', '#f00', '#fff'];

        
        setInterval(() => {
            hexDisplay.innerText = "0x" + Math.random().toString(16).slice(2,8).toUpperCase();
        }, 100);

        function triggerSequence() {
            
            body.classList.add('shake-hard');
            setTimeout(() => body.classList.remove('shake-hard'), 300);

            
            
            setTimeout(() => {
                letters.forEach((span, index) => {
                    setTimeout(() => {
                        span.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                        span.classList.add('fall');
                    }, index * 30);
                });

                
                
                setTimeout(() => {
                    letters.forEach(span => {
                        span.classList.remove('fall');
                        span.style.color = '#fff';
                    });
                }, 3000);
            }, 3000);
        }

        
        
        setTimeout(triggerSequence, 800);
        setInterval(triggerSequence, 7000);

        
        setTimeout(() => {
            window.location.href = "inicio.html";
        }, 15000);
    </script>
</body>
</html>
