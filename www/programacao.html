<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; font-family: 'Consolas', monospace; }
        body { background: #000; color: #3b82f6; margin: 0; padding: 20px; }
        
        #hub-title { font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; color: #555; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); 
            gap: 15px; 
        }

        
        .game-btn {
            background: #0a0a0a; border: 1px solid #222;
            padding: 15px; border-radius: 8px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            transition: 0.2s;
        }
        .game-btn:hover { border-color: #3b82f6; background: #111; }
        .game-btn .icon { font-size: 24px; margin-bottom: 10px; }
        .game-btn .name { font-size: 10px; color: #eee; text-align: center; overflow: hidden; }


        #viewport {
            display: none; position: fixed; inset: 0; background: #000; z-index: 999;
        }
        iframe { width: 100%; height: 100%; border: none; }
        .close-bar {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,0,0,0.7); color: #fff; border: none;
            padding: 5px 12px; border-radius: 4px; cursor: pointer; z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="hub-title">SYS/CODESLANGUAGE/BIN_ROOT</div>
    <div class="grid" id="game-list">
        </div>

    <div id="viewport">
        <button class="close-bar" onclick="closeGame()">FECHAR [X]</button>
        <iframe id="frame" src=""></iframe>
    </div>

    <script>
        
        const games = [
            "programacao/python.html",
            "programacao/portugol.html", 
            "programacao/lua.html"
        ];

        const listContainer = document.getElementById('game-list');

        function initHub() {
            games.forEach(file => {
                
                let cleanName = file.replace('.html', '').replace('_', ' ').toUpperCase();
                
                const btn = document.createElement('div');
                btn.className = 'game-btn';
                btn.onclick = () => launch(file);
                
                
                let icon = "🖥️";
                if(file.includes("portugol")) icon = "🇵🇹";
                if(file.includes("lua")) icon = "🌕";
                if(file.includes("python")) icon = "🐍";

                btn.innerHTML = `
                    <div class="icon">${icon}</div>
                    <div class="name">${cleanName}</div>
                `;
                listContainer.appendChild(btn);
            });
        }

        function launch(url) {
            const view = document.getElementById('viewport');
            const frame = document.getElementById('frame');
            frame.src = url;
            view.style.display = 'block';
        }

        function closeGame() {
            document.getElementById('viewport').style.display = 'none';
            document.getElementById('frame').src = '';
        }

        initHub();
    </script>
</body>
</html>
