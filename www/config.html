<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
}

/* Título */
h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

/* Container */
.lang-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Botões */
button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(10px);
}

button:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.02);
}

/* Badge idioma */
.lang-tag {
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<h2>🌐 Idioma do Sistema</h2>

<div class="lang-container">

<button onclick="setLang('pt')">
    🇧🇷 Português (BR)

</button>

/* 🚀 FUNÇÃO PRINCIPAL */
function setLang(lang) {

    const dict = LANGS[lang];

    // salva idioma (pra usar no sistema inteiro)
    localStorage.setItem("ghost_lang", lang);

    for (let id in dict) {
        window.parent.postMessage({
            type: 'rename_app',
            id: id,
            newName: dict[id]
        }, '*');
    }
}
