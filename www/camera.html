<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 15px; background: #000; 
            color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* Toolbar Superior */
        .toolbar { 
            display: flex; justify-content: space-between; align-items: center;
            background: #111; padding: 12px; border-radius: 12px; border: 1px solid #333;
            margin-bottom: 20px; flex-shrink: 0;
        }
        
        .btn-action {
            background: #222; border: 1px solid #444; color: #fff;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
        }
        .btn-action:active { background: #3b82f6; border-color: #3b82f6; }

        /* Grid de Fotos */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; overflow-y: auto; flex: 1; padding-bottom: 20px;
        }
        .photo-thumb {
            aspect-ratio: 1/1; background: #111; border-radius: 8px;
            overflow: hidden; border: 1px solid #333; position: relative;
        }
        .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* Visualizador de Foto Full (Lightbox) */
        #viewer-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 1000; display: none; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }
        #viewer-img { max-width: 100%; max-height: 80vh; border-radius: 8px; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        .viewer-controls { margin-top: 20px; display: flex; gap: 15px; width: 100%; justify-content: center; }

        /* Loader */
        #loader { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #3b82f6; font-size: 12px; letter-spacing: 2px; display: none;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <span style="font-size: 10px; letter-spacing: 2px; color: #3b82f6; font-weight: bold;">NDJ / GALLERY</span>
        <div style="display: flex; gap: 8px;">
            <label class="btn-action">📁 <input type="file" id="file-input" hidden onchange="uploadImage(this)"></label>
            <button class="btn-action" onclick="takePicture()">📷 BIO-CAM</button>
            <button class="btn-action" style="color: #ff5f57;" onclick="window.parent.postMessage({type:'CLOSE_WINDOW'}, '*')">✕</button>
        </div>
    </div>

    <div id="loader">PROCESSANDO...</div>
    <div class="gallery-grid" id="main-grid"></div>

    <div id="viewer-modal">
        <img id="viewer-img" src="">
        <div class="viewer-controls">
            <button class="btn-action" onclick="closeViewer()">FECHAR</button>
            <button class="btn-action" id="del-btn" style="color:#ff5f57;">EXCLUIR</button>
        </div>
    </div>

    <!-- IMPORTAÇÃO EXPLICITA DA API DO CAPACITOR EM WEB APP SEM BUNDLER -->
    <script type="module">
        import { Capacitor } from 'https://unpkg.com';
        import { Camera, CameraResultType, CameraSource } from 'https://unpkg.com';
        
        // Expõe para o escopo global para o HTML poder acessar via 'onclick'
        window.Capacitor = Capacitor;
        window.CapacitorCamera = Camera;
        window.CameraResultType = CameraResultType;
        window.CameraSource = CameraSource;
    </script>

    <script>
        const grid = document.getElementById('main-grid');
        const loader = document.getElementById('loader');

        async function takePicture() {
            // Verifica a nova referência global injetada pelo script do módulo acima
            const Camera = window.CapacitorCamera;
            if (!Camera) return alert("Câmera indisponível: Driver ou Plugin do Capacitor não detectado.");

            try {
                loader.style.display = 'block';
                
                // Correções de propriedades e ENUMS do Capacitor Camera
                const image = await Camera.getPhoto({
                    quality: 90,
                    allowEditing: false,
                    resultType: window.CameraResultType.DataUrl, // Uso do ENUM correto
                    source: window.CameraSource.Camera // Uso do ENUM correto para abrir direto na câmera
                });

                const name = `IMG_${Date.now()}.png`;
                saveToSystem(name, image.dataUrl);
                createThumb(name, image.dataUrl);
            } catch (e) {
                console.warn("Usuário cancelou ou ocorreu erro na câmera:", e);
            } finally {
                loader.style.display = 'none';
            }
        }

        function uploadImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const name = `IMG_${Date.now()}.png`;
                    saveToSystem(name, e.target.result);
                    createThumb(name, e.target.result);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function saveToSystem(name, data) {
            let files = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            files[name] = data;
            localStorage.setItem('ndj_user_files', JSON.stringify(files));
        }

        function createThumb(name, src) {
            const div = document.createElement('div');
            div.className = 'photo-thumb';
            div.onclick = () => openViewer(name, src);
            div.innerHTML = `<img src="${src}" loading="lazy">`;
            grid.prepend(div);
        }

        function openViewer(name, src) {
            const modal = document.getElementById('viewer-modal');
            document.getElementById('viewer-img').src = src;
            document.getElementById('del-btn').onclick = () => deletePhoto(name);
            modal.style.display = 'flex';
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
        }

        function deletePhoto(name) {
            if (!confirm("Excluir foto permanentemente?")) return;
            let files = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            delete files[name];
            localStorage.setItem('ndj_user_files', JSON.stringify(files));
            location.reload(); 
        }

        function loadGallery() {
            let files = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            Object.keys(files).filter(k => k.startsWith('IMG_')).sort().forEach(name => {
                createThumb(name, files[name]);
            });
        }

        window.onload = loadGallery;
    </script>
</body>
</html>
