<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    padding: 20px;
}

/* Título */
h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

/* Container */
.lang-container {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* Botões */
button {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(10px);
}

button:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.02);
}

/* Badge idioma */
.lang-tag {
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<h2>🌐 Idioma do Sistema</h2>

<div class="lang-container">

<button onclick="setLang('pt')">
    🇧🇷 Português (BR)
    <span class="lang-tag">PT-BR 100%</span>
</button>

<button onclick="setLang('en')">
    🇺🇸 English
    <span class="lang-tag">EN-US 100%</span>
</button>

<button onclick="setLang('es')">
    🇪🇸 Español
    <span class="lang-tag">ES 82%</span>
</button>

<button onclick="setLang('fr')">
    🇫🇷 Français
    <span class="lang-tag">FR 84%</span>
</button>

<button onclick="setLang('de')">
    🇩🇪 Deutsch
    <span class="lang-tag">DE 54%</span>
</button>

<button onclick="setLang('jp')">
    🇯🇵 日本語
    <span class="lang-tag">JP 35%</span>
</button>

</div>

<script>

/* 🌍 DICIONÁRIO GLOBAL (ESCALÁVEL) */
const LANGS = {

pt: {
    AJUSTES: "Ajustes",
    GHOSTNET: "GhostNet",
    ARQUIVOS: "Arquivos",
    CALCULADORA: "Calculadora",
    TRADUTOR: "Tradutor",
    GALERIA: "Galeria",
    BUSSOLA: "Bússola",
    STOAT: "Doninha",
    RELOGIO: "Relógio"
},

en: {
    AJUSTES: "Settings",
    GHOSTNET: "Browser",
    ARQUIVOS: "Files",
    CALCULADORA: "Calculator",
    TRADUTOR: "Translator",
    GALERIA: "Gallery",
    BUSSOLA: "Compass",
    RELOGIO: "Clock",
    STOAT: "Stoat"
},

es: {
    AJUSTES: "Ajustes",
    GHOSTNET: "Navegador",
    ARQUIVOS: "Archivos",
    CALCULADORA: "Calculadora",
    TRADUTOR: "Traductor",
    GALERIA: "Galería",
    BUSSOLA: "Brújula",
    RELOGIO: "Reloj",
    STOAT: "Comadreja"
},

fr: {
    AJUSTES: "Paramètres",
    GHOSTNET: "Navigateur",
    ARQUIVOS: "Fichiers",
    CALCULADORA: "Calculatrice",
    TRADUTOR: "Traducteur",
    GALERIA: "Galerie",
    BUSSOLA: "Boussole",
    STOAT: "Belette",
    RELOGIO: "Horloge"
},

de: {
    AJUSTES: "Einstellungen",
    GHOSTNET: "Browser",
    ARQUIVOS: "Dateien",
    CALCULADORA: "Rechner",
    TRADUTOR: "Übersetzer",
    GALERIA: "Galerie",
    BUSSOLA: "Kompass",
    STOAT: "Hermelin",
    RELOGIO: "Uhr"
},

jp: {
    AJUSTES: "設定",
    GHOSTNET: "ブラウザ",
    ARQUIVOS: "ファイル",
    CALCULADORA: "電卓",
    TRADUTOR: "翻訳",
    GALERIA: "ギャラリー",
    BUSSOLA: "コンパス",
    STOAT: "オコジョ",
    RELOGIO: "時計"
}

};

/* 🚀 FUNÇÃO PRINCIPAL */
function setLang(lang) {

    const dict = LANGS[lang];

    // salva idioma (pra usar no sistema inteiro)
    localStorage.setItem("ghost_lang", lang);

    for (let id in dict) {
        window.parent.postMessage({
            type: 'RENAME_APP',
            id: id,
            newName: dict[id]
        }, '*');
    }
}

</script>

</body>
</html>
