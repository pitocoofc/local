<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Engine</title>
    <style>
        :root { --bg: #d1e7dd; --card: #ffffff; --text: #1a1a1a; --border: #a3cfbb; --accent: #198754; }
        body.dark { --bg: #1a1a1a; --card: #2d2d2d; --text: #e0e0e0; --border: #444; --accent: #22c55e; }

        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        
        .header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; padding: 15px; }
        .logo { font-size: 22px; font-weight: bold; color: var(--accent); }
        
        .controls button { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 8px; cursor: pointer; color: var(--text); }

        .container { width: 100%; max-width: 500px; background: var(--card); border-radius: 12px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid var(--border); box-sizing: border-box; }
        
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
        select { background: var(--card); border: 1px solid var(--border); color: var(--accent); font-weight: bold; font-size: 14px; padding: 8px; border-radius: 5px; flex: 1; outline: none; }
        
        .swap-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--accent); padding: 0 5px; }

        textarea { width: 100%; height: 110px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; box-sizing: border-box; background: transparent; color: var(--text); font-size: 16px; resize: none; }
        
        .btn-main { width: 100%; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 15px 0; transition: 0.2s; }
        .btn-main:active { transform: scale(0.98); }
        
        .result-box { width: 100%; min-height: 100px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; box-sizing: border-box; background: var(--bg); position: relative; padding-bottom: 45px; transition: 0.3s; }
        #output-text { font-size: 16px; word-break: break-word; }

        .audio-btn { position: absolute; bottom: 8px; right: 8px; background: var(--accent); color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .engine-selector { display: flex; flex-direction: column; gap: 5px; margin-top: 15px; font-size: 11px; }
        .engine-selector label { color: #888; font-weight: bold; }
        #instancia { width: 100%; font-size: 12px; color: var(--text); border: 1px solid var(--border); background: var(--card); }
        
        footer { 
            margin-top: 20px; 
            padding: 15px; 
            font-size: 11px; 
            color: var(--accent); 
            text-align: center; 
            line-height: 1.5;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">GhostTranslate</div>
        <div class="controls">
            <button onclick="toggleTheme()" id="theme-icon">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <select id="lang-src"></select>
            <button class="swap-btn" onclick="inverter()">⇄</button>
            <select id="lang-tgt"></select>
        </div>

        <textarea id="input-text" placeholder="Digite o texto para traduzir..."></textarea>
        
        <button class="btn-main" onclick="traduzir()">TRADUZIR</button>

        <div class="result-box">
            <div id="output-text">Sua tradução aparecerá aqui...</div>
            <button class="audio-btn" onclick="ouvir()">🔊</button>
        </div>
        
        <div class="engine-selector">
            <label for="instancia">Mecanismo / API Principal:</label>
            <select id="instancia">
                <option value="simplytranslate">SimplyTranslate API (Principal)</option>
                <option value="google_free">Google Client Dictionary (Alternativa 1)</option>
                <option value="mymemory">MyMemory Translation Engine (Alternativa 2)</option>
            </select>
        </div>
    </div>

    <footer>
        Licensed under AGPLv3<br>
        Engine Core by <b>Ghost</b>
    </footer>

    <script>
        const idiomas = [
            {code: 'de', name: 'Alemão'}, {code: 'ar', name: 'Árabe'}, {code: 'zh', name: 'Chinês'},
            {code: 'ko', name: 'Coreano'}, {code: 'es', name: 'Espanhol'}, {code: 'fr', name: 'Francês'},
            {code: 'hi', name: 'Hindi'}, {code: 'en', name: 'Inglês'}, {code: 'it', name: 'Italiano'},
            {code: 'ja', name: 'Japonês'}, {code: 'pt', name: 'Português'}, {code: 'ru', name: 'Russo'}
        ].sort((a, b) => a.name.localeCompare(b.name));

        const srcSelect = document.getElementById('lang-src');
        const tgtSelect = document.getElementById('lang-tgt');

        idiomas.forEach(lang => {
            srcSelect.add(new Option(lang.name, lang.code));
            tgtSelect.add(new Option(lang.name, lang.code));
        });

        srcSelect.value = 'pt';
        tgtSelect.value = 'en';

        function toggleTheme() {
            document.body.classList.toggle('dark');
            document.getElementById('theme-icon').innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
        }

        function inverter() {
            const temp = srcSelect.value;
            srcSelect.value = tgtSelect.value;
            tgtSelect.value = temp;
        }

        
        async function fetchSimplyTranslate(text, source, target) {
            // Rota pública funcional e atualizada do SimplyTranslate
            const url = `https://simplytranslate.org/api/translate/?engine=google&text=${encodeURIComponent(text)}&current=${source}&target=${target}`;
            const res = await fetch(url);
            const data = await res.json();
            return data['translated-text'] || data.translation || null;
        }

        async function fetchGoogleFree(text, source, target) {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data && data[0]) {
                let traduzido = "";
                data[0].forEach(part => {
                    if (part[0]) traduzido += part[0];
                });
                return traduzido;
            }
            throw new Error('Falha no Google Gateway');
        }

        async function fetchMyMemory(text, source, target) {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.responseData && data.responseData.translatedText) {
                return data.responseData.translatedText;
            }
            throw new Error('Falha no MyMemory');
        }

        
        async function traduzir() {
            const text = document.getElementById('input-text').value.trim();
            const output = document.getElementById('output-text');
            const engineChoice = document.getElementById('instancia').value;
            
            if (!text) return;
            output.innerText = "Traduzindo...";

            const sl = srcSelect.value;
            const tl = tgtSelect.value;

            let enginesQueue = [];
            if (engineChoice === 'simplytranslate') {
                enginesQueue = [fetchSimplyTranslate, fetchGoogleFree, fetchMyMemory];
            } else if (engineChoice === 'google_free') {
                enginesQueue = [fetchGoogleFree, fetchSimplyTranslate, fetchMyMemory];
            } else {
                enginesQueue = [fetchMyMemory, fetchGoogleFree, fetchSimplyTranslate];
            }

            let traduzidoComSucesso = false;
            for (let i = 0; i < enginesQueue.length; i++) {
                try {
                    const resultado = await enginesQueue[i](text, sl, tl);
                    if (resultado) {
                        output.innerText = resultado;
                        traduzidoComSucesso = true;
                        break;
                    }
                } catch (err) {
                    console.warn(`Mecanismo ${i+1} falhou. Tentando próxima rota de contingência...`);
                }
            }

            if (!traduzidoComSucesso) {
                output.innerText = "Erro global: Todos os servidores falharam ou bloquearam a requisição. Tente novamente mais tarde.";
            }
        }

        function ouvir() {
            const text = document.getElementById('output-text').innerText;
            if (!text || text === "Sua tradução aparecerá aqui..." || text === "Traduzindo...") return;
            
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = tgtSelect.value;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
